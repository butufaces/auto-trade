version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: invest_bot_db
    environment:
      POSTGRES_USER: investbot
      POSTGRES_PASSWORD: investbot_password_123
      POSTGRES_DB: invest_bot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: invest_bot
    environment:
      NODE_ENV: development
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://investbot:investbot_password_123@postgres:5432/invest_bot_db
      ADMIN_IDS: ${ADMIN_IDS}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
